name: Build Android APK Fast

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Install Android Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev libgdbm-dev libsqlite3-dev libb2-dev liblzma-dev tk-dev uuid-dev libreadline-dev
        pip3 install --user --upgrade buildozer

    - name: Configure Buildozer Project
      run: |
        ~/.local/bin/buildozer init
        # Tell buildozer to include your C file and name the app
        sed -i 's/title = My Application/title = 3D Tic Tac Toe/' buildozer.spec
        sed -i 's/package.name = myapp/package.name = tictactoe/' buildozer.spec
        sed -i 's/source.include_exts = py,png,jpg,kv,atlas/source.include_exts = c,h/' buildozer.spec

    - name: Build APK with Buildozer
      run: |
        # This will compile your main.c straight into an Android app package
        ~/.local/bin/buildozer android debug

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: 3d-tic-tac-toe-apk
        path: bin/*.apk
