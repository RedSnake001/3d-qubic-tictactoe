name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Accept SDK Licenses & Download NDK
      run: |
        yes | sdkmanager --licenses
        sdkmanager --install "ndk;25.2.9519653" "build-tools;33.0.2" "platforms;android-33"

    - name: Setup Raylib Source
      run: |
        git clone --depth 1 https://github.com/raysan5/raylib.git

    - name: Cross-Compile Raylib Static Library
      run: |
        cd raylib/src
        make PLATFORM=PLATFORM_ANDROID ANDROID_NDK=$ANDROID_HOME/ndk/25.2.9519653 ANDROID_ARCH=arm64-v8a

    - name: Build Standalone Game Binary
      run: |
        mkdir -p app-build/jniLibs/arm64-v8a
        export NDK_CC=$ANDROID_HOME/ndk/25.2.9519653/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android33-clang
        $NDK_CC -o app-build/jniLibs/arm64-v8a/libgame.so main.c -shared -I./raylib/src -L./raylib/src -lraylib -lGLESv2 -lEGL -landroid -llog

    - name: Package Minimal APK Layout
      run: |
        cd app-build
        echo "plugins { id 'com.android.application' }" > build.gradle
        echo "android { compileSdk 33; defaultConfig { applicationId 'com.qubic.game'; minSdk 24; targetSdk 33; versionCode 1; versionName '1.0' } }" >> build.gradle
        mkdir -p src/main
        echo "<manifest xmlns:android='http://schemas.android.com/apk/res/android' package='com.qubic.game'><application android:label='3dQubic' android:hasCode='false'><activity android:name='android.app.NativeActivity' android:exported='true'><meta-data android:name='android.app.lib_name' android:value='game'/><intent-filter><action android:name='android.intent.action.MAIN'/><category android:name='android.intent.category.LAUNCHER'/></intent-filter></activity></application></manifest>" > src/main/AndroidManifest.xml
        gradle init --type basic --dsl groovy --incubating
        gradle assembleDebug || true

    - name: Upload Generated APK
      uses: actions/upload-artifact@v4
      with:
        name: 3dQubic-Android-APK
        path: |
          app-build/build/outputs/apk/debug/*.apk
          **/*.apk
